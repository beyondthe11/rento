<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RentWise - Smart Furniture Rental Bangalore</title>
    <!-- React & Babel CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-[#FAFAFA] text-[#111]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // Simplified SVG Icons for browser environment
        const BagIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>;
        const CloseIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>;
        const ArrowRightIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>;

        const Logo = ({ className = "h-10", dark = true }) => (
            <svg viewBox="0 0 420 250" className={className} fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M110 100L135 100V85H150V92L220 50L330 115" stroke={dark ? "#111" : "white"} strokeWidth="4" strokeLinecap="round"/>
                <text x="30" y="160" fill={dark ? "#111" : "white"} fontSize="42" fontWeight="900" style={{ letterSpacing: '1px' }}>RENT</text>
                <text x="30" y="205" fill={dark ? "#111" : "white"} fontSize="42" fontWeight="900" style={{ letterSpacing: '1px' }}>WISE</text>
                <text x="220" y="160" fill={dark ? "#111" : "white"} fontSize="38" fontWeight="500">ರೆಂಟ್</text>
                <text x="220" y="205" fill={dark ? "#111" : "white"} fontSize="38" fontWeight="500">ಬುದ್ಧಿವಂತ</text>
                <text x="90" y="240" fill={dark ? "#111" : "white"} fontSize="18" fontWeight="300" style={{ letterSpacing: '12px' }}>BANGALORE</text>
            </svg>
        );

        const App = () => {
            const [cart, setCart] = useState([]);
            const [isCartOpen, setIsCartOpen] = useState(false);
            const [activeCategory, setActiveCategory] = useState('All');

            const products = [
                { id: 1, name: "SÖDERHAMN Edition", category: "Living", price: 1499, image: "https://images.unsplash.com/photo-1555041469-a586c61ea9bc?auto=format&fit=crop&q=80&w=800" },
                { id: 2, name: "MALM Platform Bed", category: "Bedroom", price: 1850, image: "https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?auto=format&fit=crop&q=80&w=800" },
                { id: 3, name: "BEKANT Work Desk", category: "Office", price: 799, image: "https://images.unsplash.com/photo-1518455027359-f3f8164ba6bd?auto=format&fit=crop&q=80&w=800" }
            ];

            const addToCart = (product) => {
                setCart([...cart, product]);
                setIsCartOpen(true);
            };

            const subtotal = cart.reduce((acc, item) => acc + item.price, 0);

            return (
                <div className="min-h-screen">
                    {/* Header */}
                    <nav className="fixed w-full z-50 py-6 bg-white/90 backdrop-blur-md shadow-sm">
                        <div className="max-w-7xl mx-auto px-6 flex justify-between items-center">
                            <Logo className="h-8 md:h-9" />
                            <button onClick={() => setIsCartOpen(true)} className="relative p-2.5 bg-white rounded-full border border-gray-200">
                                <BagIcon />
                                {cart.length > 0 && (
                                    <span className="absolute -top-1 -right-1 w-4 h-4 bg-black text-white text-[9px] flex items-center justify-center rounded-full font-bold">
                                        {cart.length}
                                    </span>
                                )}
                            </button>
                        </div>
                    </nav>

                    {/* Hero */}
                    <section className="pt-40 pb-20 px-6">
                        <div className="max-w-7xl mx-auto text-center">
                            <h1 className="text-6xl md:text-8xl font-light tracking-tighter leading-[0.9] mb-8">
                                Live beautiful. <br />
                                <span className="font-serif italic text-gray-400">Rent smart.</span>
                            </h1>
                            <p className="max-w-md mx-auto text-lg text-gray-500 font-light mb-10 leading-relaxed">
                                Curated designer furniture subscriptions for Bangalore's modern nomad. No deposits, free setup.
                            </p>
                            <a href="#catalog" className="inline-flex items-center gap-2 px-8 py-4 bg-[#111] text-white text-[11px] font-bold uppercase tracking-[2px] rounded-full hover:bg-gray-800 transition-all shadow-lg">
                                Browse Catalog <ArrowRightIcon />
                            </a>
                        </div>
                    </section>

                    {/* Catalog */}
                    <section id="catalog" className="py-20 px-6 max-w-7xl mx-auto">
                        <h2 className="text-4xl font-light mb-12">Collections</h2>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-10">
                            {products.map(product => (
                                <div key={product.id} className="group bg-white p-4 rounded-2xl border border-gray-100">
                                    <img src={product.image} className="aspect-[4/5] w-full object-cover rounded-xl mb-6" />
                                    <div className="flex justify-between mb-4">
                                        <div>
                                            <p className="text-[9px] text-gray-400 font-bold uppercase tracking-wider">{product.category}</p>
                                            <h3 className="text-lg font-medium">{product.name}</h3>
                                        </div>
                                        <p className="font-bold">₹{product.price}</p>
                                    </div>
                                    <button onClick={() => addToCart(product)} className="w-full py-3 bg-gray-50 text-[10px] font-bold uppercase tracking-[2px] rounded-lg group-hover:bg-black group-hover:text-white transition-all">
                                        Add to Bag
                                    </button>
                                </div>
                            ))}
                        </div>
                    </section>

                    {/* Cart Drawer */}
                    {isCartOpen && (
                        <div className="fixed inset-0 z-[150] flex justify-end">
                            <div className="absolute inset-0 bg-black/30 backdrop-blur-sm" onClick={() => setIsCartOpen(false)}></div>
                            <div className="relative w-full max-w-md bg-white h-full flex flex-col p-6">
                                <div className="flex justify-between items-center mb-6">
                                    <h3 className="text-[11px] font-bold uppercase tracking-[2px]">Bag ({cart.length})</h3>
                                    <button onClick={() => setIsCartOpen(false)}><CloseIcon /></button>
                                </div>
                                <div className="flex-grow">
                                    {cart.map((item, i) => (
                                        <div key={i} className="flex gap-4 mb-4">
                                            <img src={item.image} className="w-16 h-16 object-cover rounded" />
                                            <div>
                                                <h4 className="text-sm font-bold">{item.name}</h4>
                                                <p className="text-xs">₹{item.price}/mo</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                <div className="pt-4 border-t">
                                    <div className="flex justify-between font-bold mb-4"><span>Total:</span><span>₹{subtotal}</span></div>
                                    <button className="w-full py-4 bg-black text-white font-bold uppercase text-[11px] tracking-widest rounded-lg">Check Out</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
